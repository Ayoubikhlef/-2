databases:
  - name: aos-db
    databaseName: aos
    plan: free
    ipAllowList: []

services:
  - type: web
    name: aos-api
    env: node
    region: frankfurt
    plan: free
    rootDir: server
    buildCommand: npm install && npx prisma generate && npx prisma db push && npx tsx src/seed.ts && npx tsc
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: aos-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: CORS_ORIGIN
        value: https://aos-tech-store.vercel.app
      - key: NODE_ENV
        value: production
